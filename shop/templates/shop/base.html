<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AuraBazaar{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'shop/css/main.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% load static %}

    <!-- Navbar -->
    <nav class="navbar">
      <div class="container">
        <a class="nav-brand" href="/shop">Aura<span>Bazaar</span></a>

        <ul class="nav-links" id="nav-links">
          <li><a href="/shop">Home</a></li>
          <li><a href="/shop/about">About</a></li>
          <li><a href="/shop/contact">Contact</a></li>
          <li><a href="/shop/tracker">Track Order</a></li>
        </ul>

        <div class="nav-right">
          <form
            class="search-form"
            method="get"
            action="/shop/search/"
            role="search"
          >
            <input
              type="search"
              name="search"
              placeholder="Search products..."
              aria-label="Search"
            />
            <button type="submit" aria-label="Submit search">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </form>

          <button class="cart-btn" onclick="openCart()" aria-label="Open cart">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 01-8 0" />
            </svg>
            Cart&nbsp;<span class="cart-count" id="cart-count">0</span>
          </button>

          <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Cart offcanvas -->
    <div class="offcanvas-overlay" id="cart-overlay"></div>
    <div class="offcanvas" id="cart-offcanvas" aria-label="Shopping cart">
      <div class="offcanvas-header">
        <h2>Your Cart</h2>
        <button
          class="btn btn-ghost btn-icon"
          onclick="closeCart()"
          aria-label="Close cart"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="offcanvas-body">
        <div id="cart-lines"></div>
      </div>
      <div class="offcanvas-footer">
        <div class="cart-total-row">
          <span>Total</span>
          <span>Rs. <span id="cart-total">0</span></span>
        </div>
        <a
          href="/shop/checkout"
          class="btn btn-primary btn-full"
          onclick="closeCart()"
        >
          Checkout
        </a>
        <button class="btn btn-danger btn-full btn-sm" onclick="Cart.clear()">
          Clear Cart
        </button>
      </div>
    </div>

    <!-- Toast stack -->
    <div class="toast-stack" id="toast-stack"></div>

    <!-- Page content -->
    <main>{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2025 AuraBazaar. All rights reserved.</p>
    </footer>

    <script src="{% static 'shop/js/cart.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
